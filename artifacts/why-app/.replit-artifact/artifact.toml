kind = "web"
previewPath = "/"
title = "WHY Dating App"
version = "1.0.0"
id = "artifacts/why-app"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21621

[services.development]
run = "pnpm --filter @workspace/why-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/why-app", "run", "build" ]
serve = "static"
publicDir = "artifacts/why-app/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21621"
BASE_PATH = "/"
